# Shared app config — referenced by the server and worker via the `<<` merge key.
# Values are interpolated from the compose env file (.env by default), so only
# the keys each container actually needs are injected — not the whole file.
x-app-env: &app-env
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  ACCESS_SECRET: ${ACCESS_SECRET}
  JWT_ISSUER: ${JWT_ISSUER}
  JWT_AUDIENCE: ${JWT_AUDIENCE}
  REDIS_ADDR: ${REDIS_ADDR}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  RABBITMQ_HOST: ${RABBITMQ_HOST}
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}

services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:8.6
    container_name: "redis"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli --no-auth-warning -a "$$REDIS_PASSWORD" ping | grep PONG',
        ]
      interval: 1s
      timeout: 3s
      retries: 5
    command:
      [
        "redis-server",
        "--save",
        "60",
        "1",
        "--dir",
        "/data",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION}-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    volumes:
      - ./rabbitmq:/var/lib/rabbitmq
    healthcheck:
      # check_port_connectivity verifies the AMQP listener (5672) is actually
      # accepting connections, not just that the node is alive (ping).
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
      start_interval: 5s
    ports:
      - 5672:5672
      - 15672:15672
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  server: # name of our service (can be anything like server,worker,postgres,redis,etc)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # image: golang:1.26.3
    container_name: server
    build: # build image using Dockerfile in current directory
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080" # map host port 8080 -> container port 8080
        # format is "HOST:CONTAINER"
        # so localhost:8080 on our machine
        # hits port 8080 inside the container
    volumes:
      - .:/app # BIND MOUNT - this is the magic line
        # "." = your current project folder on host
        # "/app" = folder inside the conainer
        # they are now the SAME folder, live synced
        #Keep the /app in the folder and sync it but we don't want to keep the /app/tmp the binary of the go in the host machine it should be only in the docker container
      - /app/tmp # ANONYMOUS VOLUME for the tmp folder
        # This EXCLUDES /app/tmp from the bind mount
        # Why? Air compiles binary into ./tmp/main
        # we don't want that binary synced back
        # to our host machine, keep it container-only
      - go_build_cache:/root/.cache/go-build # persist compiler cache across container rebuilds
      - go_mod_cache:/go/pkg/mod # persist downloaded modules across container rebuilds
    command: air -c .air.server.toml # override CMD, use server config
    environment:
      <<: *app-env # inject only the keys the app reads (see x-app-env above)
      GO_ENV: development # optional env var, useful for config switches

  worker:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # image: golang:1.26.3
    container_name: worker
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "8081:8081"
    volumes:
      - .:/app
      - /app/tmp
      - go_build_cache:/root/.cache/go-build
      - go_mod_cache:/go/pkg/mod
    command: air -c .air.worker.toml
    environment:
      <<: *app-env # same app config as the server
      GO_ENV: development

volumes:
  postgresql_data: # we have to right the volumes at the end of the docker-compose.yml file and this volume is used to store/presist the data in my machine
    # this data only gets delete only if i delete my docker volume or delete the container
  redis_data:
  go_build_cache: # Go compiler cache — speeds up rebuilds
  go_mod_cache: # Downloaded Go modules — survives container rebuilds
